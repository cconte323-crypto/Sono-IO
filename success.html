<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sono IO — Payment Successful</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
      box-sizing: border-box;
      text-align: center;
    }
    .container { max-width: 480px; width: 100%; }
    h1 { font-size: 1.8rem; margin-bottom: 8px; }
    h1 span { color: #4ade80; }
    p { color: #9ca3af; line-height: 1.7; margin: 0 0 12px; }
    .credits-box {
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      border-radius: 12px;
      padding: 24px;
      margin: 24px 0;
    }
    .credits-num {
      font-size: 3rem;
      font-weight: 700;
      color: #4ade80;
      line-height: 1;
      margin-bottom: 8px;
    }
    .spinner {
      border: 3px solid #2d2d2d;
      border-top: 3px solid #4ade80;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      animation: spin 1s linear infinite;
      margin: 24px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .send-btn {
      display: inline-block;
      background: #4ade80;
      color: #0f0f0f;
      text-decoration: none;
      font-weight: 600;
      border-radius: 8px;
      padding: 14px 32px;
      font-size: 1rem;
      margin-top: 8px;
    }
    .error { color: #f87171; }
    code {
      background: #1a1a1a;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      word-break: break-all;
    }
    #status { font-size: 1rem; margin-bottom: 0; }
  </style>
</head>
<body>
<div class="container">
  <h1>Payment <span>successful</span></h1>
  <p id="status">Confirming your purchase...</p>
  <div id="spinner" class="spinner"></div>
  <div id="result"></div>
</div>

<script>
  var LAMBDA_URL = 'https://ziv5mhmtijteuxkknijcwhukji0mhjid.lambda-url.us-east-2.on.aws';

  var params = new URLSearchParams(window.location.search);
  var sessionId = params.get('session_id');
  var statusEl = document.getElementById('status');
  var spinnerEl = document.getElementById('spinner');
  var resultEl = document.getElementById('result');

  function showError(msg) {
    spinnerEl.style.display = 'none';
    statusEl.textContent = '';
    resultEl.innerHTML = '<p class="error">' + msg + '</p>';
  }

  function showSuccess(data) {
    spinnerEl.style.display = 'none';
    statusEl.textContent = 'Your credits are ready:';
    resultEl.innerHTML =
      '<div class="credits-box">' +
        '<div class="credits-num">' + data.creditsRemaining + '</div>' +
        '<p>of ' + data.creditsPurchased + ' anonymous texts remaining</p>' +
      '</div>' +
      '<p>Credits ID: <code>' + data.creditsId + '</code></p>' +
      '<a class="send-btn" href="/send.html?credits_id=' + encodeURIComponent(data.creditsId) + '">' +
        'Start sending messages &rarr;' +
      '</a>';
  }

  function fetchCredits() {
    if (!sessionId) {
      showError('No session ID found. Please contact support if you completed a payment.');
      return;
    }

    fetch(LAMBDA_URL + '/credits?session_id=' + encodeURIComponent(sessionId))
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (data.creditsRemaining !== undefined) {
          showSuccess(data);
        } else {
          showError('Could not confirm your purchase. Please contact support with your session ID: ' + sessionId);
        }
      })
      .catch(function(err) {
        showError('Network error. Please refresh the page or contact support.');
      });
  }

  // Wait 4 seconds then fetch once — gives webhook time to fire
  setTimeout(fetchCredits, 4000);
</script>
</body>
</html>
